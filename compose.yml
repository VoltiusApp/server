services:
  db:
    image: postgres:16-alpine
    container_name: voltius-db
    environment:
      POSTGRES_USER: voltius
      POSTGRES_PASSWORD: voltius
      POSTGRES_DB: voltius
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voltius -d voltius"]
      interval: 2s
      timeout: 5s
      retries: 10

  server:
    image: ghcr.io/VoltiusApp/voltius-server:latest
    container_name: voltius-server
    networks:
      - default
      - cloudflare
    ports:
      - "14372:8080"
    environment:
      DATABASE_URL: postgres://voltius:voltius@db/voltius
      JWT_SECRET: dev-secret-change-me-in-production-32bytes
      PORT: "8080"
      RUST_LOG: info
      SYNC_RATE_LIMIT: ${SYNC_RATE_LIMIT:-10000}
      ADMIN_SECRET: ${ADMIN_SECRET}
      LEMONSQUEEZY_SIGNING_SECRET: ${LEMONSQUEEZY_SIGNING_SECRET:-}
      LEMONSQUEEZY_STORE_SLUG: ${LEMONSQUEEZY_STORE_SLUG:-}
      LS_VARIANT_PRO_MONTHLY: ${LS_VARIANT_PRO_MONTHLY:-}
      LS_VARIANT_PRO_YEARLY: ${LS_VARIANT_PRO_YEARLY:-}
      LS_VARIANT_TEAMS_MONTHLY: ${LS_VARIANT_TEAMS_MONTHLY:-}
      LS_VARIANT_TEAMS_YEARLY: ${LS_VARIANT_TEAMS_YEARLY:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:

networks:
  cloudflare:
    external: true