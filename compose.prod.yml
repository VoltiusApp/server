services:
  server:
    build: .
    container_name: voltius-server
    networks:
      - cloudflare
    ports:
      - "14372:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      PORT: "8080"
      RUST_LOG: info
      SYNC_RATE_LIMIT: ${SYNC_RATE_LIMIT:-10000}
      REGISTER_RATE_LIMIT: ${REGISTER_RATE_LIMIT:-20}
      INVITE_RATE_LIMIT: ${INVITE_RATE_LIMIT:-20}
      ADMIN_SECRET: ${ADMIN_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://voltius.app,https://www.voltius.app,https://app.voltius.app,tauri://localhost,https://tauri.localhost,http://localhost:1420,http://localhost:1421}
      LEMONSQUEEZY_SIGNING_SECRET: ${LEMONSQUEEZY_SIGNING_SECRET}
      LEMONSQUEEZY_STORE_SLUG: ${LEMONSQUEEZY_STORE_SLUG}
      LS_VARIANT_PRO_MONTHLY: ${LS_VARIANT_PRO_MONTHLY}
      LS_VARIANT_PRO_YEARLY: ${LS_VARIANT_PRO_YEARLY}
      LS_VARIANT_TEAMS_MONTHLY: ${LS_VARIANT_TEAMS_MONTHLY}
      LS_VARIANT_TEAMS_YEARLY: ${LS_VARIANT_TEAMS_YEARLY}
      LS_TEST_MODE: ${LS_TEST_MODE:-false}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

networks:
  cloudflare:
    external: true
