services:
  server:
    build: .
    container_name: voltius-server
    networks:
      - cloudflare
    ports:
      - "14372:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      PORT: "8080"
      RUST_LOG: info
      SYNC_RATE_LIMIT: ${SYNC_RATE_LIMIT:-10000}
      ADMIN_SECRET: ${ADMIN_SECRET}
      CORS_ORIGINS: https://voltius.app,https://www.voltius.app,https://app.voltius.app
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

networks:
  cloudflare:
    external: true
